name: SplitClub CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: splitclub-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  EXPO_NO_TELEMETRY: 1

jobs:
  web:
    name: Web and domain checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check Expo dependency alignment
        run: bunx expo install --check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Export web
        run: bunx expo export --platform web

  android:
    name: Android debug build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check Expo dependency alignment
        run: bunx expo install --check

      - name: Generate Android project
        run: bunx expo prebuild --platform android --no-install

      - name: Build Android debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v7.0.1
        with:
          name: splitclub-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
