name: Cloudflare Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cloudflare-deploy.yml
      - bun.lock
      - migrations/**
      - package.json
      - src/**
      - worker/**
      - wrangler.toml

concurrency:
  group: splitclub-cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true
  EXPO_NO_TELEMETRY: 1

jobs:
  deploy:
    name: Deploy Worker
    if: ${{ github.event_name == 'workflow_dispatch' || vars.CLOUDFLARE_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check Expo dependency alignment
        run: bunx expo install --check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Validate Cloudflare production config
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          missing=0
          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for production Worker deploys"
              missing=1
            fi
          done
          if grep -q "replace-with-cloudflare-d1-id" wrangler.toml; then
            echo "::error::wrangler.toml still contains the D1 database_id placeholder"
            missing=1
          fi
          exit "$missing"

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply splitclub --remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
